<!DOCTYPE html>
<html lang="ro" data-theme="light" style=""><head>


<title>Cum am construit o echipă de agenți AI pentru SDLC complet</title>

<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #0a0a0f;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .slide-container {
            position: relative;
            width: 1280px;
            height: 720px;
            overflow: hidden;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
        }
        
        .background-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 1280px;
            height: 720px;
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(59, 130, 246, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(139, 92, 246, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(6, 182, 212, 0.05) 0%, transparent 40%);
            z-index: 1;
        }
        
        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 1280px;
            height: 720px;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 2;
        }
        
        .floating-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(1px);
            opacity: 0.4;
        }
        
        .orb-1 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.3) 0%, transparent 70%);
            top: 10%;
            left: 80%;
            animation: float 6s ease-in-out infinite;
        }
        
        .orb-2 {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.3) 0%, transparent 70%);
            top: 60%;
            left: 5%;
            animation: float 8s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        .main-content {
            position: absolute;
            top: 80px;
            left: 90px;
            width: 1100px;
            height: 480px;
            text-align: center;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .title-container {
            margin-bottom: 40px;
        }
        
        .main-title {
            font-size: 64px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
            line-height: 1.1;
            background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            font-size: 26px;
            color: #94a3b8;
            margin-bottom: 40px;
            font-weight: 400;
        }
        
        .tech-stack {
            display: flex;
            gap: 20px;
            margin-bottom: 60px;
            justify-content: center;
        }
        
        .tech-item {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 8px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            color: #e2e8f0;
        }
        
        .tech-icon {
            color: #3b82f6;
            font-size: 18px;
        }
        
        .presenter-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 20px 32px;
            background: rgba(30, 41, 59, 0.6);
            border-radius: 12px;
            border: 1px solid rgba(59, 130, 246, 0.2);
            width: fit-content;
        }
        
        .presenter-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 20px;
        }
        
        .presenter-details {
            text-align: left;
        }
        
        .presenter-name {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
        }
        
        .presenter-role {
            font-size: 14px;
            color: #94a3b8;
        }
        
        .context-badge {
            display: inline-block;
            padding: 2px 10px;
            background: rgba(59, 130, 246, 0.2);
            border-radius: 20px;
            font-size: 12px;
            color: #60a5fa;
            margin-left: 10px;
        }
        
        .abstract-visual {
            position: absolute;
            top: 580px;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 100px;
            z-index: 5;
        }
        
        .flow-diagram {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }
        
        .flow-node {
            width: 100px;
            height: 70px;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(59, 130, 246, 0.4);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .flow-icon {
            color: #3b82f6;
            font-size: 24px;
            margin-bottom: 6px;
        }
        
        .flow-label {
            font-size: 12px;
            color: #94a3b8;
            font-weight: 500;
        }
        
        .flow-arrow {
            color: #3b82f6;
            font-size: 20px;
            opacity: 0.7;
        }
        
        .status-indicator {
            position: absolute;
            top: 30px;
            left: 1100px;
            width: 150px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 20;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.6; }
        }
        
        .status-text {
            font-size: 14px;
            color: #10b981;
            font-weight: 500;
        }
    </style>
</head>
<body style="">
<div class="slide-container">
<div class="background-pattern"><br></div>
<div class="floating-orb orb-1"></div>
<div class="floating-orb orb-2"></div>
<div class="status-indicator">
<div class="status-dot"></div>
<span class="status-text">AI Team Active</span>
</div>
<div class="main-content">
<div class="title-container">
<h1 class="main-title">Cum am construit o echipă de agenți AI<br>pentru SDLC complet</h1>
<p class="subtitle">De la experiment la sistem de livrare real</p>
</div>
<div class="tech-stack">
<div class="tech-item">
<i class="fas fa-code tech-icon"></i>
<span>Cursor</span>
</div>
<div class="tech-item">
<i class="fab fa-github tech-icon"></i>
<span>GitHub</span>
</div>
<div class="tech-item">
<i class="fas fa-tasks tech-icon"></i>
<span>Jira MCP</span>
</div>
<div class="tech-item">
<i class="fas fa-database tech-icon"></i>
<span>Databricks</span>
</div>
</div>
<div class="presenter-info" style="position: relative; transform: translate(10.3523px, 14.4932px);">

<div class="presenter-details">
<div class="presenter-name" style="position: relative; transform: translate(54.867px, 0px);">[Adrian-Dumitru Iftime] <span class="context-badge" style="position: relative; transform: translate(-182.2px, 20.7045px);">[Medior Data Engineer</span></div></div></div></div>
</div>

</body></html>
