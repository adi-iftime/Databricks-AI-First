<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1280, height=720">
  <title>Git Pull Requests</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background: #0a0a0f;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .slide-container {
      width: 1280px;
      height: 720px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 20px 36px 28px;
      gap: 14px;
    }
    h1 {
      flex: 0 0 auto;
      max-width: 100%;
      font-size: 26px;
      font-weight: 600;
      color: #e2e8f0;
      text-align: center;
      line-height: 1.25;
    }
    .figure-wrap {
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
    }
  </style>
</head>
<body>
  <div class="slide-container">
    <h1>Git Pull Requests</h1>
    <div class="figure-wrap">
      <img src="../images/Git%20pull%20Requests.png" alt="Git Pull Requests">
    </div>
  </div>
</body>
</html>
