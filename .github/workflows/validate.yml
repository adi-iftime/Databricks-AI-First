name: Validate Databricks bundle

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

concurrency:
  group: bundle-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      DATABRICKS_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      DATABRICKS_AUTH_TYPE: azure-client-secret
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies and run offline tests
        run: |
          pip install -r requirements-dev.txt
          pytest -q

      - uses: databricks/setup-cli@main

      - name: databricks bundle validate (dev)
        run: databricks bundle validate -t dev
