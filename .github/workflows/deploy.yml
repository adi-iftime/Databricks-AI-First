name: Deploy Databricks bundle

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      target:
        description: Bundle target name (dev or prod)
        required: true
        default: dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      BUNDLE_TARGET: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target || 'dev' }}
      BRONZE_SEED_SRC: fixtures/bronze_ingest_sample.jsonl
      BRONZE_SEED_500_SRC: fixtures/bronze_ingest_sample_500.jsonl
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML (resolve bronze paths from bundle)
        run: pip install "pyyaml>=6.0.1"

      - name: Resolve bronze seed destinations from databricks.yml
        id: bronze_seeds
        run: python3 scripts/resolve_bronze_seed_dests.py

      - uses: databricks/setup-cli@main

      - name: Preflight (secrets + workspace host)
        run: |
          set -euo pipefail
          if [ -z "${DATABRICKS_HOST:-}" ] || [ -z "${DATABRICKS_TOKEN:-}" ]; then
            echo "::error::Missing DATABRICKS_HOST or DATABRICKS_TOKEN secrets."
            exit 1
          fi
          if grep -q 'adb-0000000000000000' databricks.yml; then
            echo "::error::Replace placeholder workspace.host in databricks.yml before deploy."
            exit 1
          fi

      - name: databricks bundle deploy
        run: databricks bundle deploy -t "${BUNDLE_TARGET}" --auto-approve

      - name: Seed bronze volume (JSONL fixtures)
        env:
          BRONZE_SEED_DEST: ${{ steps.bronze_seeds.outputs.bronze_seed_dest }}
          BRONZE_SEED_500_DEST: ${{ steps.bronze_seeds.outputs.bronze_seed_500_dest }}
        run: |
          set -euo pipefail
          test -f "${BRONZE_SEED_SRC}"
          test -f "${BRONZE_SEED_500_SRC}"
          test -n "${BRONZE_SEED_DEST}"
          test -n "${BRONZE_SEED_500_DEST}"
          # UC fs cp often needs the volume path prefix created first (volume root only — not a `sample/` subfolder).
          BRONZE_VOLUME_ROOT="$(dirname "${BRONZE_SEED_DEST}")"
          echo "Ensuring volume path exists: ${BRONZE_VOLUME_ROOT}"
          databricks fs mkdir "${BRONZE_VOLUME_ROOT}"
          echo "Uploading ${BRONZE_SEED_SRC} -> ${BRONZE_SEED_DEST}"
          databricks fs cp "${BRONZE_SEED_SRC}" "${BRONZE_SEED_DEST}" --overwrite
          echo "Uploading ${BRONZE_SEED_500_SRC} -> ${BRONZE_SEED_500_DEST}"
          databricks fs cp "${BRONZE_SEED_500_SRC}" "${BRONZE_SEED_500_DEST}" --overwrite
