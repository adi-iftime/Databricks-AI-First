# Replace the workspace host below with your Databricks workspace URL (literal string only — no bundle interpolation).
bundle:
  name: databricks_ai_first

workspace:
  host: https://adb-3696551871930054.14.azuredatabricks.net
  root_path: /Shared/.bundle/databricks_ai_first

sync:
  exclude:
    - .git
    - "**/__pycache__"
    - "**/*.pyc"
    - tests
    - docs

variables:
  catalog:
    default: main
  bronze_source_path:
    description: Unity Catalog volume or cloud path where raw JSON files land for Auto Loader
    default: /Volumes/main/default/bronze_ingest/sample
  pipeline_spark_version:
    description: DBR version for the DLT pipeline cluster (classic compute; serverless DLT is not enabled in all workspaces)
    default: 15.4.x-scala2.12
  pipeline_node_type_id:
    description: Worker node type for the DLT pipeline (must exist in your workspace region)
    default: Standard_DS3_v2

resources:
  pipelines:
    medallion_dlt:
      name: medallion_dlt
      catalog: ${var.catalog}
      development: false
      clusters:
        - label: default
          spark_version: ${var.pipeline_spark_version}
          node_type_id: ${var.pipeline_node_type_id}
          num_workers: 1
      configuration:
        bundle.catalog: ${var.catalog}
        bundle.bronze_source_path: ${var.bronze_source_path}
        spark.databricks.delta.schema.autoMerge.enabled: "true"
      libraries:
        - file:
            path: ./src/pipelines/medallion_dlt.py
      schema: medallion_dlt

# Shared bundle roots (/Shared/.bundle/...) require production mode. "dev" here is only the target name for CI/CD, not Databricks development-mode deployments.
targets:
  dev:
    mode: production
    default: true
    variables:
      catalog: main
  prod:
    mode: production
    variables:
      catalog: main
