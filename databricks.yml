# Replace the workspace host below with your Azure Databricks URL (literal string only — no bundle interpolation).
bundle:
  name: databricks_ai_first

workspace:
  host: https://adb-0000000000000000.0.azuredatabricks.net
  root_path: /Shared/.bundle/databricks_ai_first

sync:
  exclude:
    - .git
    - "**/__pycache__"
    - "**/*.pyc"
    - tests
    - docs

variables:
  catalog:
    default: main
  bronze_source_path:
    description: Unity Catalog volume or cloud path where raw JSON files land for Auto Loader
    default: /Volumes/main/default/bronze_ingest/sample

resources:
  pipelines:
    medallion_dlt:
      name: medallion_dlt
      catalog: ${var.catalog}
      development: false
      serverless: true
      configuration:
        bundle.catalog: ${var.catalog}
        bundle.bronze_source_path: ${var.bronze_source_path}
        spark.databricks.delta.schema.autoMerge.enabled: "true"
      libraries:
        - file:
            path: ./src/pipelines/medallion_dlt.py
      schema: medallion_dlt

targets:
  dev:
    mode: development
    default: true
    variables:
      catalog: main
  prod:
    mode: production
    variables:
      catalog: main
